# Sub2api Workflow Add Or Enhance Admin Frontend Feature

## Action

Follow the add-or-enhance-admin-frontend-feature workflow:
1. Edit or create Vue component(s) under frontend/src/views/admin or frontend/src/components/admin
2. Update i18n translation files (frontend/src/i18n/locales/en.ts, zh.ts)
3. Add or update related API files (frontend/src/api/admin/*.ts)
4. Write or update frontend tests (frontend/src/views/admin/__tests__/*.spec.ts, frontend/src/components/admin/**/__tests__/*.spec.ts)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: frontend/src/views/admin/*.vue, frontend/src/components/admin/**/*.vue, frontend/src/i18n/locales/en.ts

